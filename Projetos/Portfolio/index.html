<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedro Henrique Fonseca</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <h1>Pedro Henrique Fonseca</h1>

    <div class="social-links">
      <a href="https://www.instagram.com/pedro.h.fs" target="_blank" rel="noopener" title="Instagram">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
        </svg>
      </a>
      <a href="mailto:pedrohfonseca@me.com" title="Email">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <polyline points="2,4 12,13 22,4"/>
        </svg>
      </a>
    </div>

    <p class="bio">
      Architect and photographer. I photograph cities, and the cities. I photograph the streets,
      positive and negative spaces, and the ones who live between them.
    </p>
    <nav class="filters" id="filters">
      <button class="filter-btn active" data-tag="all">Todas</button>
    </nav>
  </header>

  <main>
    <div class="gallery" id="gallery">
      <p class="empty">Nenhuma foto encontrada. Adicione imagens à pasta <code>fotos/</code> e faça push.</p>
    </div>
  </main>

  <!-- Visualizador -->
  <div class="viewer" id="viewer" hidden>
    <div class="viewer-top">
      <span class="viewer-counter" id="viewer-counter"></span>
      <div class="viewer-controls">
        <button id="btn-fullscreen" title="Tela cheia">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
          </svg>
        </button>
        <button id="btn-close" title="Fechar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="nav-btn prev" id="btn-prev" title="Anterior">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <div class="viewer-content">
      <img class="viewer-img" id="viewer-img" src="" alt="">
      <div class="viewer-info" id="viewer-info"></div>
    </div>

    <button class="nav-btn next" id="btn-next" title="Próxima">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>
  </div>

  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
