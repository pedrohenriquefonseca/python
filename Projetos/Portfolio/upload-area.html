<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload — Pedro Henrique Fonseca</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 40px;
      border-bottom: 1px solid #eee;
    }

    header h1 {
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888;
    }

    header a {
      font-size: 0.78rem;
      color: #888;
      text-decoration: none;
      letter-spacing: 0.05em;
    }

    header a:hover { color: #111; }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 40px;
      gap: 32px;
    }

    /* ── Drop zone ── */
    .drop-zone {
      width: 100%;
      max-width: 600px;
      border: 2px dashed #ccc;
      border-radius: 12px;
      padding: 60px 40px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .drop-zone.drag-over {
      border-color: #FFE600;
      background: #fffde6;
    }

    .drop-zone p {
      font-size: 0.88rem;
      color: #888;
      line-height: 1.7;
    }

    .drop-zone strong {
      color: #111;
      font-weight: 500;
    }

    .drop-zone input[type="file"] {
      display: none;
    }

    .btn-select {
      display: inline-block;
      margin-top: 16px;
      padding: 9px 22px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-select:hover { background: #333; }

    /* ── Fila de arquivos ── */
    .file-list {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border: 1px solid #eee;
      border-radius: 8px;
      font-size: 0.82rem;
    }

    .file-item .file-name {
      flex: 1;
      color: #333;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-item .file-size {
      color: #aaa;
      font-size: 0.75rem;
      white-space: nowrap;
    }

    .file-status {
      font-size: 0.75rem;
      white-space: nowrap;
      font-weight: 500;
    }

    .file-status.pending  { color: #aaa; }
    .file-status.sending  { color: #f90; }
    .file-status.ok       { color: #2a2; }
    .file-status.error    { color: #c00; }

    /* ── Botão enviar ── */
    .btn-upload {
      padding: 11px 36px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-upload:hover:not(:disabled) { background: #333; }

    .btn-upload:disabled {
      background: #ccc;
      cursor: default;
    }

    .upload-msg {
      font-size: 0.8rem;
      color: #888;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <h1>Pedro Henrique Fonseca — Upload</h1>
    <a href="index.html">← voltar ao portfolio</a>
  </header>

  <main>
    <div class="drop-zone" id="drop-zone">
      <p><strong>Arraste as fotos aqui</strong><br>ou clique para selecionar</p>
      <button class="btn-select" id="btn-select">Selecionar arquivos</button>
      <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" multiple>
    </div>

    <div class="file-list" id="file-list"></div>

    <button class="btn-upload" id="btn-upload" disabled>Enviar para o portfolio</button>
    <p class="upload-msg" id="upload-msg"></p>
  </main>

  <script>
    // ── Autenticação ──────────────────────────────────────────
    if (sessionStorage.getItem('upload_auth') !== '1') {
      window.location.href = 'upload.html';
    }

    // URL do Cloudflare Worker (preencher após criar o Worker)
    const WORKER_URL = 'WORKER_URL_AQUI';

    // ── Estado ────────────────────────────────────────────────
    let selectedFiles = [];

    // ── Drop zone ─────────────────────────────────────────────
    const dropZone  = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    document.getElementById('btn-select').addEventListener('click', e => {
      e.stopPropagation();
      fileInput.click();
    });

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      addFiles([...e.dataTransfer.files]);
    });

    fileInput.addEventListener('change', () => {
      addFiles([...fileInput.files]);
      fileInput.value = '';
    });

    // ── Gerenciar arquivos ────────────────────────────────────
    function addFiles(files) {
      const valid = files.filter(f => f.type.startsWith('image/'));
      valid.forEach(f => {
        if (!selectedFiles.find(s => s.file.name === f.name)) {
          selectedFiles.push({ file: f, status: 'pending' });
        }
      });
      renderFileList();
      document.getElementById('btn-upload').disabled = selectedFiles.length === 0;
    }

    function renderFileList() {
      const list = document.getElementById('file-list');
      list.innerHTML = '';
      selectedFiles.forEach((item, idx) => {
        const el = document.createElement('div');
        el.className = 'file-item';
        el.id = `file-item-${idx}`;
        el.innerHTML = `
          <span class="file-name">${item.file.name}</span>
          <span class="file-size">${(item.file.size / 1024 / 1024).toFixed(1)} MB</span>
          <span class="file-status ${item.status}" id="status-${idx}">${statusLabel(item.status)}</span>
        `;
        list.appendChild(el);
      });
    }

    function statusLabel(s) {
      return { pending: 'aguardando', sending: 'enviando…', ok: '✓ enviado', error: '✗ erro' }[s] || s;
    }

    function setStatus(idx, status) {
      selectedFiles[idx].status = status;
      const el = document.getElementById(`status-${idx}`);
      if (el) {
        el.className = `file-status ${status}`;
        el.textContent = statusLabel(status);
      }
    }

    // ── Upload ────────────────────────────────────────────────
    document.getElementById('btn-upload').addEventListener('click', async () => {
      document.getElementById('btn-upload').disabled = true;
      document.getElementById('upload-msg').textContent = '';

      let ok = 0, fail = 0;

      for (let i = 0; i < selectedFiles.length; i++) {
        if (selectedFiles[i].status === 'ok') continue;
        setStatus(i, 'sending');
        try {
          const base64 = await toBase64(selectedFiles[i].file);
          const res = await fetch(WORKER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              filename: selectedFiles[i].file.name,
              content:  base64,
            }),
          });
          if (res.ok) { setStatus(i, 'ok'); ok++; }
          else        { setStatus(i, 'error'); fail++; }
        } catch {
          setStatus(i, 'error'); fail++;
        }
      }

      const msg = [];
      if (ok)   msg.push(`${ok} foto${ok > 1 ? 's' : ''} enviada${ok > 1 ? 's' : ''} com sucesso.`);
      if (fail) msg.push(`${fail} erro${fail > 1 ? 's' : ''}.`);
      document.getElementById('upload-msg').textContent = msg.join('  ');

      const pending = selectedFiles.filter(f => f.status !== 'ok').length;
      document.getElementById('btn-upload').disabled = pending === 0;
    });

    function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload  = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
  </script>

</body>
</html>
