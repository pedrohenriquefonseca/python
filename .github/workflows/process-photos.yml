name: Processar Fotos

on:
  push:
    paths:
      - 'Portfolio/fotos/**'
  workflow_dispatch:

jobs:
  processar:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar ExifTool
        run: sudo apt-get install -y libimage-exiftool-perl

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Instalar Pillow
        run: pip install Pillow

      - name: Processar fotos (EXIF + thumbnails + remover órfãos)
        run: python Portfolio/processar_fotos.py

      - name: Commit arquivos atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Portfolio/fotos.json Portfolio/fotos/thumbs/
          git diff --staged --quiet || (git commit -m "Auto: processar fotos" && git push)
