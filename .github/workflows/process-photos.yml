name: Processar Fotos

on:
  push:
    paths:
      - 'Portfolio/fotos/*.jpg'
      - 'Portfolio/fotos/*.jpeg'
      - 'Portfolio/fotos/*.png'
      - 'Portfolio/fotos/*.JPG'
      - 'Portfolio/fotos/*.JPEG'
      - 'Portfolio/fotos/*.PNG'
  workflow_dispatch: # permite disparar manualmente pela aba Actions do GitHub

jobs:
  processar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar ExifTool
        run: sudo apt-get install -y libimage-exiftool-perl

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Instalar Pillow
        run: pip install Pillow

      - name: Processar fotos e atualizar fotos.json
        run: python .github/scripts/process_photos.py

      - name: Gerar thumbnails WebP
        run: python .github/scripts/generate_thumbs.py

      - name: Commit arquivos atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Portfolio/fotos.json Portfolio/fotos/thumbs/
          git diff --staged --quiet || (git commit -m "Auto: atualizar fotos.json e thumbnails" && git push)
